<!DOCTYPE html>
<html>
<head>
    <title>Simple Banking System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e5e7eb;
        }

        .header {
            background: #0b1220;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: bold;
            color: #38bdf8;
            border-bottom: 1px solid #1f2937;
        }

        .container {
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 22px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 800px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: 0.2s;
            color: white;
        }

        button:hover {
            transform: scale(1.05);
        }

        .login { background: #22c55e; }
        .search { background: #38bdf8; }
        .profile { background: #a78bfa; }
        .admin { background: #f59e0b; }
        .delete { background: #ef4444; }
        .transfer { background: #f97316; }

        .output {
            margin-top: 20px;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 800px;
            min-height: 120px;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

<div class="header">
    🏦 Banking Control Panel
</div>

<div class="container">

    <h1>Simple Banking System</h1>

    <div class="btn-grid">
        <button class="login" onclick="callAPI('/login')">Login</button>
        <button class="search" onclick="callAPI('/search')">Search</button>
        <button class="profile" onclick="callAPI('/profile')">Profile</button>
        <button class="admin" onclick="callAPI('/admin/dashboard')">Admin</button>
        <button class="delete" onclick="callAPI('/admin/delete-user')">Delete User</button>
        <button class="transfer" onclick="callAPI('/payment/transfer')">Transfer Money</button>
    </div>

    <div id="output" class="output">Response will appear here...</div>

</div>

<script>
async function callAPI(endpoint) {
    let res = await fetch(endpoint);
    let data = await res.json();

    document.getElementById("output").innerText =
        JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
